<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Velocity PID Controller Simulation</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --text: #959393;
            --muted: #7e7e7e;
            --accent: #d53737;
            --accent2: #00d4ff;
            --danger: #ff5555;
            --border: #555;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin: 20px 0 20px 0;
            color: var(--accent);
        }

        .main-content-row {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
        }

        .content-row {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            width: 100%;
        }

        .content-column {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-left: 40px;
            width: fit-content;
        }

        .content-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-start;
            max-width: 1000px;

            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            padding: 20px;
            margin: 10px;
        }

        .content-header {
            text-align: center;
            gap: 20px;
            width: 95%;

            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            padding: 10px;
            margin: 10px;
        }


        canvas {
            display: block;
            border-radius: 8px;
            width: 400px;
            touch-action: none;
        }

        #controls {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 220px;
            gap: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            margin: 10px 10px 10px 10px;
        }

        #level-controls {
            align-items: center;
            width: fit-content;
        }

        h2 {
            margin: 0;
            color: var(--accent);
            text-align: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #perturb-control-group {
            align-self: center;
            width: 90%;
        }

        #auto-perturb-freq-group {
            display: none;
            flex-direction: column;
            gap: 5px;
            width: 100%;
        }

        #auto-perturb-freq-group.is-visible {
            display: flex;
        }

        .checkbox-row label {
            cursor: pointer;
            justify-content: flex-start;
            gap: 8px;
        }

        .checkbox-row input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--text);
            cursor: help;
        }

        /* Chrome, Safari, Edge, Opera */
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }

        input[type="number"] {
            width: 60px;
            text-align: center;
            padding: 4px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #222;
            color: var(--text);
        }

        /* For Webkit browsers (Chrome, Edge, Safari) */
        input[type="range"] {
            -webkit-appearance: none; /* remove default styling */
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #555; /* track background */
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent2);
            cursor: pointer;
            border: 2px solid #222;
            margin-top: -5px; /* align thumb with track */
        }

        /* For Firefox */
        input[type="range"]::-moz-range-track {
            background: #555;
            height: 6px;
            border-radius: 3px;
        }

        input[type="range"]::-moz-range-thumb {
            background: var(--accent2);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #222;
            cursor: pointer;
        }

        /* For IE/Edge */
        input[type="range"]::-ms-track {
            background: transparent;
            border-color: transparent;
            color: transparent;
            height: 6px;
        }

        input[type="range"]::-ms-fill-lower {
            background: #555;
            border-radius: 3px;
        }

        input[type="range"]::-ms-fill-upper {
            background: #555;
            border-radius: 3px;
        }

        input[type="range"]::-ms-thumb {
            background: var(--accent2);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #222;
            cursor: pointer;
        }

        input:focus {
            outline: none;
        }

        button {
            background: var(--panel);
            color: #e0e0e0;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 18px;
            margin: 6px;
            font-size: 14px;
            font-family: "Segoe UI", Roboto, sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        }

        #perturb-button {
            align-self: center;
        }

        button:hover {
            background: #2b2b2b;
            border-color: var(--border);
            color: #ffffff;
            box-shadow: 0 0 6px var(--accent2);
        }

        #chart-container {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            min-width: 750px;
            width: 100%;
            margin: 10px;
        }
        .top-links {
            align-self: flex-start;
            margin-bottom: 14px;
        }

        .top-links a {
            color: var(--accent);
            text-decoration: none;
        }

        .top-links a:hover {
            text-decoration: underline;
        }

        .site-footer {
            width: 100%;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-top: 12px;
        }
    </style>
</head>
<body>

<div class="top-links"><a href="./tools.html">< Back to Simulations &amp; Analysis Toolbox</a></div>
<div id="main-container">
    <div class="main-content-row">

        <div class="content-column">
            <div class="content-header">
                <h1>Velocity PID Controller Simulation</h1>
            </div>
            <div class="content-row">
                <div class="content-container">
                    <canvas id="canvas" width="400" height="400"></canvas>
                    <div class="control-group" id="perturb-control-group">
                        <label title="Peak torque of the disturbance envelope; it decays exponentially over time.">Disturbance size
                            <input type="number" id="perturb" step="1" value="-10">
                        </label>
                        <input type="range" id="perturb-slider" min="-100" max="100" step="1" value="-10">
                        <div class="control-group checkbox-row">
                            <label title="When enabled, applies the same perturbation envelope repeatedly at the set rate.">
                                <input type="checkbox" id="auto-perturb">
                                Auto perturb
                            </label>
                        </div>
                        <div class="control-group" id="auto-perturb-freq-group">
                            <label title="How often to start a new perturbation envelope (simulation time).">Disturbance rate (Hz)
                                <input type="number" id="auto-perturb-freq" step="0.1" min="0.5" max="10" value="1">
                            </label>
                            <input type="range" id="auto-perturb-freq-slider" min="0.5" max="10" step="0.1" value="1">
                        </div>
                        <button id="perturb-button">Perturb</button>

                    </div>
                </div>
                <div class="content-container" id="level-controls">
                    <h2>Simulation Controls</h2>
                    <div class="control-group">
                        <div class="content-row">
                            <button class="btn btn-primary" id="speedDown" type="submit"><<</button>
                            <button class="btn btn-primary" id="pause-start" type="submit">Pause</button>
                            <button class="btn btn-primary" id="speedUp" type="submit">>></button>
                        </div>
                        <button class="btn btn-primary" id="reset" type="submit">Reset</button>
                    </div>
                </div>
            </div>
            <div id="chart-container">
                <canvas id="pidChart"></canvas>
            </div>
        </div>
        <div id="controls">
            <h2>Gains</h2>
            <div class="control-group">
                <label title="Proportional gain: affects how strongly the controller reacts to velocity error">P
                    <input type="number" id="kp" step="0.1" value="5">
                </label>
                <input type="range" id="kp-slider" min="0" max="30" step="0.1" value="5">
            </div>

            <div class="control-group">
                <label title="Integral gain: accumulates past velocity errors to eliminate steady-state offset">I
                    <input type="number" id="ki" step="0.01" value="0">
                </label>
                <input type="range" id="ki-slider" min="0" max="10" step="0.01" value="0.0">
            </div>

<!--            <div class="control-group">-->
<!--                <label title="Derivative gain: dampens oscillations in velocity">D-->
<!--                    <input type="number" id="kd" step="0.001" value="0">-->
<!--                </label>-->
<!--                <input type="range" id="kd-slider" min="0" max=".5" step="0.001" value="0">-->
<!--            </div>-->

            <div class="control-group">
                <label title="Feed forward: adds torque proportional to the velocity setpoint (helps overcome drag at steady state)">FF
                    <input type="number" id="kff" step="0.01" value="0">
                </label>
                <input type="range" id="kff-slider" min="0" max="5" step="0.01" value="0">
            </div>

            <h2>Parameters</h2>

            <div class="control-group">
                <label title="Target angular velocity (setpoint) in degrees per second">Target Velocity (°/s)
                    <input type="number" id="target" step="1" value="90">
                </label>
                <input type="range" id="target-slider" min="0" max="720" step="1" value="90">
            </div>

            <div class="control-group">
                <label title="Mass (rotating inertia scaling)">Mass
                    <input type="number" id="mass" step="0.1" value="1">
                </label>
                <input type="range" id="mass-slider" min="0.5" max="10" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label title="Drag adds a damping torque proportional to angular velocity.">Drag
                    <input type="number" id="drag" step="0.05" value="1">
                </label>
                <input type="range" id="drag-slider" min="0.0" max="5" step="0.05" value="1">
            </div>

            <div class="control-group">
                <label title="Kinetic friction is a torque acting against the motion. It is NOT proportional to velocity. Non-zero kinetic friction also adds a small amount of static friction proportional to the mass in this simulation.">Kinetic
                    Friction
                    <input type="number" id="kinetic-friction" step="0.05" value="0.05">
                </label>
                <input type="range" id="kinetic-friction-slider" min="0.0" max="0.25" step="0.0005" value="0.05">
            </div>

            <div class="control-group">
                <label title="Process noise models error when measuring angular velocity">Process Noise
                    <input type="number" id="process-noise" step="0.0005" value="0.0">
                </label>
                <input type="range" id="process-noise-slider" min="0.0" max="0.05" step="0.0005" value="0.0">
            </div>

            <div class="control-group">
                <label title="Deadtime is the delay between when the calculated controller output is applied to the mechanism. Enable to delay the output by 1 timestep, disable for instant control.">Controller
                    Deadtime
                    <input type="checkbox" id="deadtime" value="" checked>
                </label>
            </div>
        </div>
    </div>
</div>


<script src="./js/chart.js"></script>
<script src="./js/luxon.min.js"></script>
<script src="./js/chartjs-adapter-luxon@1"></script>
<script>

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const SIM_DISPLAY_WHEEL_SIZE = 110;
    const SIM_DISPLAY_WHEEL_RADIUS_PX = SIM_DISPLAY_WHEEL_SIZE / 2;

    // Horizontal world scroll (px); advances at ω * r so ground matches wheel contact speed
    let groundScrollPx = 0;

    // Rotation state (angle integrates angular velocity for display)
    let angle = 0;
    let targetWheelAngle = 0;
    let angularVelocity = 0;
    let targetAngularVelocity = (Math.PI / 180.0) * 90;

    // PID state
    let integral = 0;
    let lastError = 0;
    let lastLastError = 0;

    // Parameters
    let kp = 5, ki = 0.0, kd = 0, kff = 0.0;
    let mass = 1;
    let armLength = 75;
    let drag = 1.0;
    let kineticFriction = 0.05;
    let torque = 0;

    // Noise parameters
    let processNoise = 0.0;
    let deadtime = true;

    // Disturbance: exponential decay envelope peak * exp(-t / tau), not an instantaneous impulse
    let disturbanceMag = -10;
    let perturbElapsed = -1;
    let perturbPeak = 0;
    const perturbDecayTau = 0.12;

    let autoPerturbEnabled = false;
    let autoPerturbFreqHz = 1;
    let timeSinceAutoPerturb = 0;

    // Sim & render speed vars
    let dt = 0.016;
    const nominalDt = 0.016;
    let renderSpeed = 0.016;
    let accumTime = 0;
    let lastDt = dt;

    // parse input safely
    function safeParse(val, defaultVal) {
        const parsed = parseFloat(val);
        return isFinite(parsed) ? parsed : defaultVal;
    }

    // Generate a gaussian sample
    // https://stackoverflow.com/questions/25582882/javascript-math-random-normal-distribution-gaussian-bell-curve
    function gaussianSample(mean = 0, stdDev = 1) {
        let u1 = Math.random();
        let u2 = Math.random();
        let z0 = Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
        return z0 * stdDev + mean;
    }

    // Link number inputs and sliders
    function bindInputSlider(numberId, sliderId, callback) {
        const numberInput = document.getElementById(numberId);
        const slider = document.getElementById(sliderId);
        numberInput.addEventListener("input", e => {
            const val = safeParse(e.target.value, callback());
            slider.value = val;
            callback(val);
        });
        slider.addEventListener("input", e => {
            const val = safeParse(e.target.value, callback());
            numberInput.value = val;
            callback(val);
        });
    }

    function bindInputCheckbox(checkboxId, callback) {
        const checkboxInput = document.getElementById(checkboxId);
        checkboxInput.addEventListener("change", e => {
            const checked = checkboxInput.checked;
            callback(checked);

        });
    }

    function bindButton(buttonId, callback) {
        const buttonInput = document.getElementById(buttonId);
        buttonInput.addEventListener("click", e => {
            console.log("button toggled");
            const value = buttonInput.textContent;
            callback(value);
        })
    }

    // Bind all inputs
    bindInputSlider("kp", "kp-slider", v => v !== undefined ? (kp = v) : kp);
    bindInputSlider("ki", "ki-slider", v => v !== undefined ? (ki = v) : ki);
    // bindInputSlider("kd", "kd-slider", v => v !== undefined ? (kd = v) : kd);
    bindInputSlider("kff", "kff-slider", v => v !== undefined ? (kff = v) : kff);
    bindInputSlider("target", "target-slider", v => v !== undefined ? (targetAngularVelocity = v * Math.PI / 180) : targetAngularVelocity * 180 / Math.PI);
    bindInputSlider("mass", "mass-slider", v => v !== undefined ? (mass = v) : mass);
    bindInputSlider("drag", "drag-slider", v => v !== undefined ? (drag = v) : drag);
    bindInputSlider("kinetic-friction", "kinetic-friction-slider", v => v !== undefined ? (kineticFriction = v) : kineticFriction);
    bindInputSlider("process-noise", "process-noise-slider", v => v !== undefined ? (processNoise = v) : processNoise);
    bindInputSlider("perturb", "perturb-slider", v => v !== undefined ? (disturbanceMag = v) : disturbanceMag);
    const autoPerturbFreqInput = document.getElementById("auto-perturb-freq");
    const autoPerturbFreqSlider = document.getElementById("auto-perturb-freq-slider");
    bindInputSlider("auto-perturb-freq", "auto-perturb-freq-slider", v => {
        if (v !== undefined) {
            autoPerturbFreqHz = Math.min(10, Math.max(0.5, safeParse(v, autoPerturbFreqHz)));
            autoPerturbFreqInput.value = autoPerturbFreqHz;
            autoPerturbFreqSlider.value = autoPerturbFreqHz;
            return autoPerturbFreqHz;
        }
        return autoPerturbFreqHz;
    });
    bindInputCheckbox("deadtime", v => v ? (deadtime = true) : (deadtime = false))

    const autoPerturbCheckbox = document.getElementById("auto-perturb");
    const autoPerturbFreqGroup = document.getElementById("auto-perturb-freq-group");
    autoPerturbCheckbox.addEventListener("change", () => {
        autoPerturbEnabled = autoPerturbCheckbox.checked;
        autoPerturbFreqGroup.classList.toggle("is-visible", autoPerturbEnabled);
        timeSinceAutoPerturb = 0;
    });

    function triggerPerturb() {
        perturbElapsed = 0;
        perturbPeak = disturbanceMag;
    }

    bindButton("speedUp", () => {
        renderSpeed < 0.064 ? renderSpeed *= 2 : renderSpeed = 0.064;
    })
    bindButton("speedDown", () => {
        renderSpeed !== 0.001 ? renderSpeed /= 2.0 : renderSpeed = 0.001;
    })

    bindButton("perturb-button", () => triggerPerturb());

    const pauseStartButton = document.getElementById("pause-start");
    pauseStartButton.addEventListener("click", e => {
        if (pauseStartButton.textContent === "Pause") {
            pauseStartButton.textContent = "Play";
            lastDt = renderSpeed;
            renderSpeed = 0;
        } else {
            pauseStartButton.textContent = "Pause";
            renderSpeed = lastDt;
        }
    });
    const resetButton = document.getElementById("reset");
    resetButton.addEventListener("click", e => {
        angle = 0;
        targetWheelAngle = 0;
        groundScrollPx = 0;
        angularVelocity = 0;
        targetAngularVelocity = 0;
        integral = 0;
        lastDt = nominalDt;

        const target = document.getElementById("target");
        target.value = 0;
        const target_slider = document.getElementById("target-slider");
        target_slider.value = 0;

        renderSpeed = nominalDt;
        pauseStartButton.textContent = "Pause";

        perturbElapsed = -1;
        perturbPeak = 0;
        timeSinceAutoPerturb = 0;
        autoPerturbEnabled = false;
        autoPerturbCheckbox.checked = false;
        autoPerturbFreqGroup.classList.remove("is-visible");
    });

    // Load images
    const wheelImage = new Image();
    wheelImage.src = './pid_sim_images/wheel.png';
    wheelImage.onload = () => {
        console.log("Wheel image loaded");
    };
    const robotBaseImage = new Image();
    robotBaseImage.src = './pid_sim_images/robot_base_zoomed.png';
    robotBaseImage.onload = () => {
        console.log("Robot base image loaded");
    };
    let chartAccumulator = 0;
    const chartInterval = renderSpeed;

    function update() {
        accumTime += renderSpeed;
        while (accumTime >= nominalDt) {
            let error = deadtime ? lastError : targetAngularVelocity - angularVelocity;
            if (processNoise > 0 && dt > 0) {
                error += gaussianSample(0, processNoise);
            }

            ki > 0 ? integral += error * dt : integral = 0;
            const derivative = dt > 0 ? (error - lastLastError) / dt : 0;
            const control = kp * error + ki * integral + kd * derivative + kff * targetAngularVelocity;
            lastError = deadtime ? targetAngularVelocity - angularVelocity : error;
            lastLastError = error;

            const inertia = mass * armLength * armLength * 0.00005;
            torque = control;

            if (autoPerturbEnabled && autoPerturbFreqHz > 0) {
                timeSinceAutoPerturb += dt;
                const period = 1 / autoPerturbFreqHz;
                while (timeSinceAutoPerturb >= period) {
                    timeSinceAutoPerturb -= period;
                    triggerPerturb();
                }
            }

            if (perturbElapsed >= 0) {
                torque += perturbPeak * Math.exp(-perturbElapsed / perturbDecayTau);
                perturbElapsed += dt;
                if (perturbElapsed > 8 * perturbDecayTau ||
                    Math.abs(perturbPeak * Math.exp(-perturbElapsed / perturbDecayTau)) < 1e-4) {
                    perturbElapsed = -1;
                }
            }

            torque = torque > 1.0e2 ? 1.0e2 : torque;
            torque = torque < -1.0e2 ? -1.0e2 : torque;

            if (angularVelocity > 0) {
                torque -= kineticFriction;
            } else if (angularVelocity < 0) {
                torque += kineticFriction;
            }
            torque += (-drag * angularVelocity);

            let angularAcc = torque / inertia;
            angularVelocity += angularAcc * dt;
            const staticFrictionMagicNumber = 0.01 / mass;
            if (Math.abs(kineticFriction) > 0 && Math.abs(angularVelocity) < staticFrictionMagicNumber && Math.abs(angularAcc) * dt < staticFrictionMagicNumber) {
                angularVelocity = 0;
            }
            angle += angularVelocity * dt;
            targetWheelAngle += targetAngularVelocity * dt;
            groundScrollPx += angularVelocity * SIM_DISPLAY_WHEEL_RADIUS_PX * dt;
            chartAccumulator += dt;
            accumTime -= dt;
            draw();
        }


        if (chartAccumulator >= chartInterval) {
            updateChart();
            chartAccumulator = 0;
        }

        requestAnimationFrame(update);
    }

    function fract(x) {
        return x - Math.floor(x);
    }

    function hash01(n) {
        return fract(Math.sin(n * 127.1 + 311.7) * 43758.5453123);
    }

    function drawGroundTexture(ctx, width, yTop, scrollPx) {
        const bandH = 20;
        const ripPeriod = 31;
        ctx.strokeStyle = "#5e5e5e";
        ctx.lineWidth = 2;
        for (let k = Math.floor((scrollPx - ripPeriod) / ripPeriod) - 2; k <= Math.floor((scrollPx + width + ripPeriod) / ripPeriod) + 2; k++) {
            const x0 = k * ripPeriod - scrollPx;
            const dip = 1+ (Math.abs(k) % 3);
            ctx.beginPath();
            ctx.moveTo(x0, yTop);
            ctx.quadraticCurveTo(x0 + ripPeriod * 0.5, yTop - dip, x0 + ripPeriod, yTop);
            ctx.stroke();
        }

        for (let x = 0; x < width; x += 4) {
            const worldX = x + scrollPx;
            const cell = Math.floor(worldX / 10);
            if (hash01(cell * 1.91 + 0.2) > 0.86) {
                const gy = yTop + 4 + hash01(cell * 3.17) * (bandH - 8);
                ctx.fillStyle = hash01(cell) > 0.5 ? "#4a4a4a" : "#3d3d3d";
                const s = 1 + (hash01(cell * 5) > 0.7 ? 1 : 0);
                ctx.fillRect(x, gy, s, s);
            }
        }

        ctx.strokeStyle = "#555";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, yTop + 0.5);
        ctx.lineTo(width, yTop + 0.5);
        ctx.stroke();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2, cy = canvas.height * 0.6;

        const groundY = cy + 60;
        drawGroundTexture(ctx, canvas.width, groundY, groundScrollPx);

        ctx.save();
        ctx.translate(cx, cy);
        ctx.translate(-60, -60);
        const rbw = robotBaseImage.width / 1.5;
        const rbh = robotBaseImage.height / 1.5;
        ctx.drawImage(
            robotBaseImage,
            -rbw / 2,
            -rbh / 2 + 20,
            rbw,
            rbh
        );
        ctx.restore();

        const wheelSize = SIM_DISPLAY_WHEEL_SIZE;
        const wheelOffX = 80;
        const wheelOffY = 13;
        function drawWheelAt(offX, offY) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.translate(offX, offY);
            ctx.rotate(angle);
            ctx.drawImage(
                wheelImage,
                0,
                0,
                wheelImage.width,
                wheelImage.height,
                -wheelSize / 2,
                -wheelSize / 2,
                wheelSize,
                wheelSize
            );
            ctx.restore();
        }
        drawWheelAt(wheelOffX - 275, wheelOffY);
        drawWheelAt(wheelOffX, wheelOffY);

        const omegaDeg = angularVelocity * 180 / Math.PI;
        const targetOmegaDeg = targetAngularVelocity * 180 / Math.PI;
        ctx.fillStyle = "#959393";
        ctx.font = "14px monospace";
        ctx.fillText("Simulation Speed: " + (renderSpeed / 0.016).toFixed(2) + "x", 10, 20);
        ctx.fillText("Target Velocity: " + targetOmegaDeg.toFixed(1) + " °/s", 10, 40);
        ctx.fillText("Velocity: " + omegaDeg.toFixed(1) + " °/s", 10, 60);
    }

    const ctxChart = document.getElementById('pidChart').getContext('2d');

    const pidChart = new Chart(ctxChart, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                {label: 'Angular Velocity', data: [], borderColor: '#00d4ff', fill: false},
                {label: 'Target Angular Velocity', data: [], borderColor: '#ff5555', fill: false},
                {label: 'Error', data: [], borderColor: '#16b300', fill: false, hidden: true},
                // {label: 'Torque', data: [], borderColor: '#ffaa00', fill: false, hidden: true},
                {label: 'Integral', data: [], borderColor: '#ff8800', fill: false, hidden: true},
            ]
        },
        options: {
            responsive: true,
            animation: false,
            plugins: {
                legend: {labels: {color: '#ccc'}}
            },
            scales: {
                x: {
                    type: 'linear', ticks: {
                        color: '#ccc', callback: function (value) {
                            return value.toFixed(2);
                        }
                    }, title: {display: true, text: 'Time (s)', color: '#ccc'}
                },
                y: {ticks: {color: '#ccc'}, title: {display: true, text: 'Values', color: '#ccc'}}
            }
        }
    });

    let time = 0;

    function updateChart() {
        time += chartAccumulator;
        pidChart.data.labels.push(time);
        const degPerSec = 180 / Math.PI;
        pidChart.data.datasets[0].data.push(angularVelocity * degPerSec);
        pidChart.data.datasets[1].data.push(targetAngularVelocity * degPerSec);
        pidChart.data.datasets[2].data.push(lastError * degPerSec);
        pidChart.data.datasets[3].data.push(integral);

        while (pidChart.data.labels.length > 0 &&
        parseFloat(pidChart.data.labels[0]) < time - 10) {
            pidChart.data.labels.shift();
            pidChart.data.datasets.forEach(ds => ds.data.shift());
        }

        pidChart.options.scales.x.min = (time - 10);
        pidChart.options.scales.x.max = time;

        pidChart.update('none');
    }

    update();
</script>
